name: Fetch Stock Data

on:
  workflow_dispatch:

  schedule:
    # Runs Monday-Friday at 5:30 PM IST (12:00 UTC)
    - cron: '0 12 * * 1-5'

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow tvdatafeed fastparquet

      - name: Run Fetch Script
        run: python Fetchdata.py

      - name: Commit Updated Stock Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add stock_data/

          git diff --cached --quiet || (
            git commit -m "Auto update stock data $(date -u +"%Y-%m-%d %H:%M UTC")"
            git push
          )
